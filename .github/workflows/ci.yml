name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff mypy
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - run: mypy src/ --ignore-missing-imports

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit/ -v -m unit --tb=short --cov=src --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'retentioniq' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_CI || 'ci_test_only' }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'retentioniq' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U retentioniq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://${{ vars.POSTGRES_USER || 'retentioniq' }}:${{ secrets.POSTGRES_PASSWORD_CI || 'ci_test_only' }}@localhost:5432/${{ vars.POSTGRES_DB || 'retentioniq' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: python scripts/init_db.py
      - run: pytest tests/integration/ -v -m integration --tb=short

  data-quality:
    name: Data Quality Checks
    runs-on: ubuntu-latest
    needs: [test-integration]
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'retentioniq' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_CI || 'ci_test_only' }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'retentioniq' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U retentioniq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://${{ vars.POSTGRES_USER || 'retentioniq' }}:${{ secrets.POSTGRES_PASSWORD_CI || 'ci_test_only' }}@localhost:5432/${{ vars.POSTGRES_DB || 'retentioniq' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: python scripts/init_db.py
      - run: python scripts/generate_franchise_data.py --locations 10 --members 10000 --months 6 --seed 42 --output data/raw/
      - run: python -m src.data.quality.run_all
